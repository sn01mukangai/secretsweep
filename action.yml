name: secretsweep
description: 'Scan your codebase for leaked secrets, API keys, and credentials before they hit production.'
author: 'CipherShield'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  path:
    description: 'Path to scan (default: current directory)'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity: high, medium, or all'
    required: false
    default: 'all'
  format:
    description: 'Output format: text, json, or github'
    required: false
    default: 'github'

runs:
  using: 'composite'
  steps:
    - name: Install secretsweep
      run: |
        VERSION="2.0.0"
        curl -sSL "https://github.com/sn01mukangai/secretsweep/releases/download/v${VERSION}/secretsweep-x86_64-unknown-linux-gnu.zip" -o /tmp/secretsweep.zip
        unzip -o /tmp/secretsweep.zip -d /tmp/secretsweep-bin
        chmod +x /tmp/secretsweep-bin/secretsweep
        sudo mv /tmp/secretsweep-bin/secretsweep /usr/local/bin/
      shell: bash

    - name: Run secretsweep
      run: |
        echo "🔍 secretsweep v2.0.0 — Scanning for leaked secrets..."
        secretsweep "${{ inputs.path }}" --format ${{ inputs.format }} --severity ${{ inputs.severity }}
      shell: bash
